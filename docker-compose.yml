services:
  api:
    build: .
    ports:
      - "8000:8000"   # FastAPI + /metrics
    environment:
      - DATABASE_URL=postgresql://postgres:postgres@postgres:5432/travel
      - REDIS_URL=redis://redis:6379
      - OPENAI_API_KEY=${OPENAI_API_KEY}
    depends_on:
      - postgres
      - redis
  postgres:
    image: postgres:16-alpine
    environment:
      - POSTGRES_PASSWORD=postgres
      - POSTGRES_DB=travel
  redis:
    image: redis:7-alpine
  prometheus:
    image: prom/prometheus:latest
    ports:
      - "9090:9090"
  grafana:
    image: grafana/grafana:latest
    ports:
      - "3000:3000"
    depends_on:
      - prometheus
